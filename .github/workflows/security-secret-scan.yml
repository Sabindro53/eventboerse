# Sicherheits-Workflow: Secret-Scanner mit Gitleaks
# Sucht nach hardcodierten Passwörtern, API-Keys und anderen Geheimnissen im Code
name: "Security – Secret Scan (Gitleaks)"

on:
  push:
  pull_request:
  schedule:
    # Täglicher Scan – jeden Morgen um 05:00 UTC
    - cron: "0 5 * * *"

# Minimale Berechtigungen
permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  gitleaks:
    name: Secrets scannen
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Schritt 1: Code vollständig auschecken (gesamte Git-History für Gitleaks)
      - name: Repository auschecken (vollständige History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Schritt 2: Gitleaks ausführen – scannt auf hardcodierte Secrets
      - name: Gitleaks Secret-Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Verhindert automatisches Issue-Erstellen durch Gitleaks selbst
          GITLEAKS_ENABLE_COMMENTS: false

      # Schritt 3: Bei Fund eines Secrets – GitHub Issue automatisch erstellen
      - name: Issue bei Secret-Fund erstellen
        if: failure() && steps.gitleaks.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Prüfen ob bereits ein offenes Issue für diesen Befund existiert
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['security', 'secret-leak']
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 [Security] Hardcodiertes Secret im Code gefunden!',
                body: `## ⚠️ Gitleaks hat ein Secret entdeckt\n\n` +
                      `**Workflow:** ${context.workflow}\n` +
                      `**Branch:** ${context.ref}\n` +
                      `**Commit:** ${context.sha}\n\n` +
                      `### Sofortmaßnahmen\n` +
                      `1. Den betroffenen Secret **sofort rotieren** (API-Key, Passwort, etc.)\n` +
                      `2. Den Secret **aus der Git-History entfernen** (git filter-repo oder BFG)\n` +
                      `3. Zukünftig Secrets nur über **GitHub Secrets** (Settings → Secrets) einbinden\n\n` +
                      `**Gitleaks-Report:** Siehe Workflow-Logs für Details.\n\n` +
                      `> Besonders prüfen: \`functions.php\`, \`webauthn.php\`, \`vault/\`-Ordner`,
                labels: ['security', 'secret-leak', 'priority: critical']
              });
            }
