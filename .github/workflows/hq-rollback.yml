name: HQ Rollback – Deploy SHA

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Commit SHA zum Deployen (7 oder 40 Zeichen)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  rollback:
    name: Rollback → ${{ github.event.inputs.target_sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate SHA exists
        run: |
          SHA="${{ github.event.inputs.target_sha }}"
          echo "Prüfe SHA: $SHA"
          git cat-file -t "$SHA" 2>/dev/null | grep -q commit \
            || { echo "❌ SHA '$SHA' nicht gefunden"; exit 1; }
          FULL_SHA=$(git rev-parse "$SHA")
          SHORT_SHA="${FULL_SHA:0:7}"
          MSG=$(git log --format='%s' -1 "$FULL_SHA")
          echo "✅ SHA gefunden: $FULL_SHA"
          echo "   Commit: $MSG"
          echo "FULL_SHA=$FULL_SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "COMMIT_MSG=$MSG" >> $GITHUB_ENV

      - name: Create rollback commit on main
        run: |
          git config user.name  "EventBörse HQ"
          git config user.email "hq@eventboerse.de"
          # Read the tree from target SHA (not a revert, a direct rollback)
          git checkout "$FULL_SHA" -- .
          # Unstage meta files we don't want to change
          git restore --staged .github/ vault/ README.md CLAUDE.md LICENSE* .gitignore .gitattributes .vscode/ .editorconfig 2>/dev/null || true
          git restore .github/ vault/ README.md CLAUDE.md LICENSE* .gitignore .gitattributes .vscode/ .editorconfig 2>/dev/null || true
          # Check if anything changed
          if git diff --cached --quiet; then
            echo "ℹ️ Keine Unterschiede zum aktuellen Stand — nichts zu committen."
            echo "SKIP_DEPLOY=true" >> $GITHUB_ENV
          else
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
            git commit -m "rollback: zurueck zu $SHORT_SHA ($COMMIT_MSG) | by ${{ github.actor }} @ $TIMESTAMP"
            git push origin main
            echo "✅ Rollback-Commit gepusht."
            echo "SKIP_DEPLOY=false" >> $GITHUB_ENV
          fi

      - name: Install lftp
        if: env.SKIP_DEPLOY != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        if: env.SKIP_DEPLOY != 'true'
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          DEPLOY_DIR="/public/wp-content/themes/eventboerse/"
          echo "🚀 Deploye Rollback zu sftp://$SFTP_HOST → $DEPLOY_DIR"
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            mirror --reverse --verbose --delete --ignore-time --transfer-all \
              -x '^\.git' -x '^\.github/' -x '^\.vscode/' -x '^\.idea/' \
              -x '^\.obsidian/' -x '^\.claude/' -x '^\.claude\.json$' \
              -x '^vault/' -x '^docs/' -x '^tests/' -x '^node_modules/' \
              -x '^LICENSE$' -x '^README\.md$' -x '^CNAME$' -x '^AGENTS\.md$' \
              -x '^\.gitignore$' -x '^\.gitattributes$' -x '^\.editorconfig$' \
              -x '^\.env' -x '^sftp-debug\.txt$' -x '^deploy-probe\.txt$' \
              -x '\.bak$' -x '\.log$' -x '\.swp$' -x '\.DS_Store$' \
              -x '^Attached Element Context' \
              . $DEPLOY_DIR;
            echo '--- Rollback Deploy complete ---';
            bye
          "

      - name: Summary
        run: |
          if [ "$SKIP_DEPLOY" = "true" ]; then
            echo "## ℹ️ Rollback übersprungen" >> $GITHUB_STEP_SUMMARY
            echo "Der gewählte Commit ist identisch mit dem aktuellen Stand." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Rollback erfolgreich" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **Target SHA** | \`$FULL_SHA\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Commit** | $COMMIT_MSG |" >> $GITHUB_STEP_SUMMARY
            echo "| **Ausgelöst von** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Deploy** | SFTP → IONOS ✅ |" >> $GITHUB_STEP_SUMMARY
          fi
