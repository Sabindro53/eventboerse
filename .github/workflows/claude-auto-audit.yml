name: Claude Auto-Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Gather code stats
        id: stats
        run: |
          echo "app_js=$(wc -l < app.js)" >> $GITHUB_OUTPUT
          echo "functions=$(wc -l < functions.php)" >> $GITHUB_OUTPUT
          echo "styles=$(wc -l < styles.css)" >> $GITHUB_OUTPUT

      - name: Extract key sections for audit
        run: |
          head -300 app.js > /tmp/app-start.txt
          grep -n "TODO\|FIXME\|HACK\|XXX\|hardcoded\|demo data\|DEMO" app.js functions.php \
            | head -60 > /tmp/todos.txt 2>/dev/null || true

      - name: Run Claude audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_LINES: ${{ steps.stats.outputs.app_js }}
          FUNC_LINES: ${{ steps.stats.outputs.functions }}
          STYLE_LINES: ${{ steps.stats.outputs.styles }}
        run: python3 .github/scripts/audit.py

      - name: Ensure audit labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "audit" --color "0075ca" --description "Automatischer Code-Audit" \
            --repo ${{ github.repository }} 2>/dev/null || true
          gh label create "automated" --color "e4e669" --description "Bot-generierter Issue" \
            --repo ${{ github.repository }} 2>/dev/null || true

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date '+%Y-%m-%d')
          {
            echo "## Automatischer Code-Audit vom ${DATE}"
            echo
            cat /tmp/audit-result.txt
            echo
            echo "---"
            echo "*Generiert von [Claude Auto-Audit](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) · Läuft täglich um 04:00 UTC*"
          } > /tmp/issue-body.md
          gh issue create \
            --title "🤖 Claude Auto-Audit ${DATE}" \
            --body-file /tmp/issue-body.md \
            --label "audit,automated" \
            --repo ${{ github.repository }}
