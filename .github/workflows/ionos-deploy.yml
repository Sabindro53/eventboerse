name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Minify assets (#6 Part 2)
        run: |
          echo "Vorher: app.js $(wc -c < app.js) B, styles.css $(wc -c < styles.css) B"
          npx --yes terser app.js --compress --mangle -o app.js
          # Gate 1: gĂĽltiges JS?
          node --check app.js
          # Gate 2: Inline-Handler-Globals noch da? (mangle.toplevel=false -> ja)
          for fn in navigateTo toggleFavorite sendMessage filterListings _startChatPoll; do
            grep -q "function $fn" app.js || { echo "FATAL: $fn fehlt nach Minify - Abbruch"; exit 1; }
          done
          # CSS (csso-cli, Fallback csso)
          npx --yes csso-cli styles.css -o styles.css || npx --yes csso styles.css -o styles.css
          echo "Nachher: app.js $(wc -c < app.js) B, styles.css $(wc -c < styles.css) B"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          DEPLOY_DIR="/public/wp-content/themes/eventboerse/"
          echo "Deploying to sftp://$SFTP_HOST â†’ $DEPLOY_DIR"
          echo "Local styles.css: $(wc -c < styles.css) bytes"
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            mirror --reverse --verbose --delete --ignore-time --transfer-all \
              -x '^\.git' -x '^\.github/' -x '^\.vscode/' -x '^\.idea/' \
              -x '^\.obsidian/' -x '^\.claude/' -x '^\.claude\.json$' \
              -x '^vault/' -x '^docs/' -x '^tests/' -x '^node_modules/' \
              -x '^LICENSE$' -x '^README\.md$' -x '^CNAME$' -x '^AGENTS\.md$' \
              -x '^\.gitignore$' -x '^\.gitattributes$' -x '^\.editorconfig$' \
              -x '^\.env' \
              -x '^sftp-debug\.txt$' -x '^deploy-probe\.txt$' \
              -x '\.bak$' -x '\.log$' -x '\.swp$' -x '\.DS_Store$' \
              -x '^Attached Element Context' \
              . $DEPLOY_DIR;
            echo '--- Deploy complete ---';
            bye
          "

      - name: Inject SMTP credentials into wp-config.php
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          SMTP_USER: ${{ secrets.EB_SMTP_USER }}
          SMTP_PASS: ${{ secrets.EB_SMTP_PASS }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ]; then
            echo "âš ď¸Ź SMTP secrets not set, skipping wp-config injection"
            exit 0
          fi
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            get /public/wp-config.php -o /tmp/wp-config.php;
            bye
          "
          echo "--- wp-config.php first 10 lines ---"
          head -n 10 /tmp/wp-config.php
          echo "--- grep EB_SMTP ---"
          grep -n 'EB_SMTP' /tmp/wp-config.php || echo "(not found)"
          # Remove any existing EB_SMTP lines (duplicates from previous deploys)
          sed -i '/EB_SMTP_USER/d' /tmp/wp-config.php
          sed -i '/EB_SMTP_PASS/d' /tmp/wp-config.php
          sed -i '/Eventb.*SMTP Config/d' /tmp/wp-config.php
          # Insert after first line that contains <?php
          LINENUM=$(grep -n '<?php' /tmp/wp-config.php | head -1 | cut -d: -f1)
          if [ -z "$LINENUM" ]; then
            echo "ERROR: <?php not found in wp-config.php!"
            exit 1
          fi
          sed -i "${LINENUM}a\\
          define('EB_SMTP_USER', '${SMTP_USER}');\\
          define('EB_SMTP_PASS', '${SMTP_PASS}');" /tmp/wp-config.php
          echo "--- verify injection ---"
          grep -n 'EB_SMTP' /tmp/wp-config.php
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            put /tmp/wp-config.php -o /public/wp-config.php;
            bye
          "
          echo "âś… SMTP constants written to wp-config.php"
          rm -f /tmp/wp-config.php

      - name: Inject Stripe credentials into wp-config.php
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          STRIPE_MODE: ${{ secrets.EB_STRIPE_MODE || vars.EB_STRIPE_MODE }}
          STRIPE_PUBLIC_KEY: ${{ secrets.EB_STRIPE_PUBLIC_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.EB_STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.EB_STRIPE_WEBHOOK_SECRET }}
          STRIPE_TEST_PUBLIC_KEY: ${{ secrets.EB_STRIPE_TEST_PUBLIC_KEY || secrets.EB_STRIPE_TEST_PUBLISHABLE_KEY }}
          STRIPE_TEST_SECRET_KEY: ${{ secrets.EB_STRIPE_TEST_SECRET_KEY || secrets.EB_STRIPE_TEST_PRIVATE_KEY }}
          STRIPE_TEST_WEBHOOK_SECRET: ${{ secrets.EB_STRIPE_TEST_WEBHOOK_SECRET }}
        run: |
          RAW_MODE=$(printf "%s" "$STRIPE_MODE" | tr '[:upper:]' '[:lower:]' | tr -d ' _-')
          if [ "$RAW_MODE" = "test" ] || [ "$RAW_MODE" = "testing" ] || [ "$RAW_MODE" = "testmode" ] || [ "$RAW_MODE" = "testmodus" ] || [ "$RAW_MODE" = "sandbox" ] || [ "$RAW_MODE" = "sandboxmode" ]; then
            NORMALIZED_STRIPE_MODE="test"
          else
            NORMALIZED_STRIPE_MODE="live"
          fi

          if { [ -z "$STRIPE_PUBLIC_KEY" ] || [ -z "$STRIPE_SECRET_KEY" ]; } && { [ -z "$STRIPE_TEST_PUBLIC_KEY" ] || [ -z "$STRIPE_TEST_SECRET_KEY" ]; }; then
            echo "âš ď¸Ź Stripe secrets not set (live or test public/secret key pair) â€” skipping"
            exit 0
          fi
          if [ "$NORMALIZED_STRIPE_MODE" = "test" ] && { [ -z "$STRIPE_TEST_PUBLIC_KEY" ] || [ -z "$STRIPE_TEST_SECRET_KEY" ]; }; then
            echo "ERROR: EB_STRIPE_MODE resolves to test, but EB_STRIPE_TEST_PUBLIC_KEY / EB_STRIPE_TEST_SECRET_KEY are missing."
            exit 1
          fi
          if [ "$NORMALIZED_STRIPE_MODE" = "live" ] && [ -n "$STRIPE_TEST_PUBLIC_KEY" ] && [ -n "$STRIPE_TEST_SECRET_KEY" ]; then
            echo "â„ąď¸Ź Stripe test keys are present, but EB_STRIPE_MODE is not test/sandbox. Live mode remains active."
          fi

          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            get /public/wp-config.php -o /tmp/wp-config.php;
            bye
          "
          echo "--- grep EB_STRIPE (before) ---"
          grep -n 'EB_STRIPE' /tmp/wp-config.php | sed -E "s/(define\\('EB_STRIPE_[A-Z_]+', ')[^']*/\\1***REDACTED***/" || echo "(not found)"
          # Remove any existing EB_STRIPE_* lines (idempotent re-inject)
          sed -i '/EB_STRIPE_MODE/d' /tmp/wp-config.php
          sed -i '/EB_STRIPE_PUBLIC_KEY/d' /tmp/wp-config.php
          sed -i '/EB_STRIPE_SECRET_KEY/d' /tmp/wp-config.php
          sed -i '/EB_STRIPE_WEBHOOK_SECRET/d' /tmp/wp-config.php
          sed -i '/EB_STRIPE_TEST_PUBLIC_KEY/d' /tmp/wp-config.php
          sed -i '/EB_STRIPE_TEST_SECRET_KEY/d' /tmp/wp-config.php
          sed -i '/EB_STRIPE_TEST_WEBHOOK_SECRET/d' /tmp/wp-config.php
          sed -i '/Eventb.*Stripe Config/d' /tmp/wp-config.php
          LINENUM=$(grep -n '<?php' /tmp/wp-config.php | head -1 | cut -d: -f1)
          if [ -z "$LINENUM" ]; then
            echo "ERROR: <?php not found in wp-config.php!"
            exit 1
          fi
          # Escape single quotes in values for safe PHP single-quoted string literal
          ESC_MODE=$(printf "%s" "$NORMALIZED_STRIPE_MODE" | sed "s/'/\\\\'/g")
          ESC_PK=$(printf "%s" "$STRIPE_PUBLIC_KEY"     | sed "s/'/\\\\'/g")
          ESC_SK=$(printf "%s" "$STRIPE_SECRET_KEY"     | sed "s/'/\\\\'/g")
          ESC_WH=$(printf "%s" "$STRIPE_WEBHOOK_SECRET" | sed "s/'/\\\\'/g")
          ESC_TEST_PK=$(printf "%s" "$STRIPE_TEST_PUBLIC_KEY"     | sed "s/'/\\\\'/g")
          ESC_TEST_SK=$(printf "%s" "$STRIPE_TEST_SECRET_KEY"     | sed "s/'/\\\\'/g")
          ESC_TEST_WH=$(printf "%s" "$STRIPE_TEST_WEBHOOK_SECRET" | sed "s/'/\\\\'/g")
          sed -i "${LINENUM}a\\
          define('EB_STRIPE_MODE', '${ESC_MODE}');\\
          define('EB_STRIPE_PUBLIC_KEY', '${ESC_PK}');\\
          define('EB_STRIPE_SECRET_KEY', '${ESC_SK}');\\
          define('EB_STRIPE_WEBHOOK_SECRET', '${ESC_WH}');\\
          define('EB_STRIPE_TEST_PUBLIC_KEY', '${ESC_TEST_PK}');\\
          define('EB_STRIPE_TEST_SECRET_KEY', '${ESC_TEST_SK}');\\
          define('EB_STRIPE_TEST_WEBHOOK_SECRET', '${ESC_TEST_WH}');" /tmp/wp-config.php
          echo "--- verify injection ---"
          grep -nE 'EB_STRIPE_(MODE|PUBLIC|SECRET|WEBHOOK|TEST_)' /tmp/wp-config.php | sed -E "s/(define\\('EB_STRIPE_[A-Z_]+', ')[^']*/\\1***REDACTED***/"
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            put /tmp/wp-config.php -o /public/wp-config.php;
            bye
          "
          echo "âś… Stripe constants written to wp-config.php"
          rm -f /tmp/wp-config.php
