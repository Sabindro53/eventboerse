name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          SFTP_DIR: ${{ secrets.IONOS_FTP_REMOTE_DIR }}
        run: |
          echo "Target: sftp://$SFTP_HOST → $SFTP_DIR"
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            echo '--- Remote directory listing ---';
            ls /;
            echo '--- Starting upload ---';
            mirror --reverse --verbose --delete -x '^\.git' -x '^\.github/' -x '^LICENSE$' -x '^README\.md$' -x '^CNAME$' . $SFTP_DIR;
            echo '--- Deploy complete ---';
            bye
          "
