name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Inject build version into app.js
        run: |
          BUILD_VERSION="$(git rev-parse --short HEAD)-$(date -u +%Y%m%d%H%M%S)"
          sed -i "s/__EB_BUILD_VERSION__/$BUILD_VERSION/g" app.js
          echo "Injected version: $BUILD_VERSION"

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          DEPLOY_DIR="/public/wp-content/themes/eventboerse/"
          echo "Deploying to sftp://$SFTP_HOST → $DEPLOY_DIR"
          echo "Local styles.css: $(wc -c < styles.css) bytes"
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            mirror --reverse --verbose --delete --ignore-time --transfer-all \
              -x '^\.git' -x '^\.github/' -x '^\.vscode/' \
              -x '^LICENSE$' -x '^README\.md$' -x '^CNAME$' \
              -x '^\.gitignore$' -x '^sftp-debug\.txt$' -x '^deploy-probe\.txt$' \
              . $DEPLOY_DIR;
            echo '--- Deploy complete ---';
            bye
          "
