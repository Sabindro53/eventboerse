name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          sudo apt-get install -y -qq sshpass
          
          echo "=== Step 1: Find correct web root ==="
          sshpass -p "$SFTP_PASS" ssh -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" '
            echo "--- pwd ---"
            pwd
            echo "--- ls / ---"
            ls -la / | head -20
            echo "--- find wp-content ---"
            find / -name "wp-config.php" -maxdepth 5 2>/dev/null | head -5
            echo "--- find theme ---"
            find / -path "*/themes/eventboerse/styles.css" -maxdepth 8 2>/dev/null | head -5
          '
