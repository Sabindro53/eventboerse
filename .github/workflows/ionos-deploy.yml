name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          DEPLOY_DIR="/public/wp-content/themes/eventboerse/"
          echo "Deploying to sftp://$SFTP_HOST → $DEPLOY_DIR"
          echo "Local styles.css: $(wc -c < styles.css) bytes"
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            set net:timeout 60;
            set net:max-retries 3;
            mirror --reverse --verbose --delete --ignore-time --transfer-all \
              -x '^\.git' -x '^\.github/' -x '^\.vscode/' \
              -x '^LICENSE$' -x '^README\.md$' -x '^CNAME$' \
              -x '^\.gitignore$' -x '^sftp-debug\.txt$' -x '^deploy-probe\.txt$' \
              . $DEPLOY_DIR;
            echo '--- Deploy complete ---';
            bye
          "

      - name: Inject SMTP credentials into wp-config.php
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
          SMTP_USER: ${{ secrets.EB_SMTP_USER }}
          SMTP_PASS: ${{ secrets.EB_SMTP_PASS }}
        run: |
          if [ -z "$SMTP_USER" ] || [ -z "$SMTP_PASS" ]; then
            echo "⚠️ SMTP secrets not set, skipping wp-config injection"
            exit 0
          fi
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            get /public/wp-config.php -o /tmp/wp-config.php;
            bye
          "
          echo "--- wp-config.php first 10 lines ---"
          head -n 10 /tmp/wp-config.php
          echo "--- grep EB_SMTP ---"
          grep -n 'EB_SMTP' /tmp/wp-config.php || echo "(not found)"
          # Remove any existing EB_SMTP lines (duplicates from previous deploys)
          sed -i '/EB_SMTP_USER/d' /tmp/wp-config.php
          sed -i '/EB_SMTP_PASS/d' /tmp/wp-config.php
          sed -i '/Eventb.*SMTP Config/d' /tmp/wp-config.php
          # Insert after first line that contains <?php
          LINENUM=$(grep -n '<?php' /tmp/wp-config.php | head -1 | cut -d: -f1)
          if [ -z "$LINENUM" ]; then
            echo "ERROR: <?php not found in wp-config.php!"
            exit 1
          fi
          sed -i "${LINENUM}a\\
          define('EB_SMTP_USER', '${SMTP_USER}');\\
          define('EB_SMTP_PASS', '${SMTP_PASS}');" /tmp/wp-config.php
          echo "--- verify injection ---"
          grep -n 'EB_SMTP' /tmp/wp-config.php
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_HOST" -e "
            set sftp:auto-confirm yes;
            put /tmp/wp-config.php -o /public/wp-config.php;
            bye
          "
          echo "✅ SMTP constants written to wp-config.php"
          rm -f /tmp/wp-config.php
