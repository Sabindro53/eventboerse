name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          sudo apt-get install -y -qq sshpass
          
          echo "=== SFTP Directory Discovery ===" > sftp-debug.txt
          echo "Host: $SFTP_HOST" >> sftp-debug.txt
          echo "User: $SFTP_USER" >> sftp-debug.txt
          echo "" >> sftp-debug.txt
          
          # Test 1: sftp batch mode
          echo "=== SFTP Batch Test ===" >> sftp-debug.txt
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" <<'EOF' >> sftp-debug.txt 2>&1 || echo "SFTP EXIT: $?" >> sftp-debug.txt
          pwd
          ls
          ls wp-content
          ls wp-content/themes
          ls wp-content/themes/eventboerse
          bye
          EOF
          
          echo "" >> sftp-debug.txt
          echo "=== Trying SSH ===" >> sftp-debug.txt
          sshpass -p "$SFTP_PASS" ssh -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" 'pwd && ls -la && ls wp-content/themes/eventboerse/ 2>&1' >> sftp-debug.txt 2>&1 || echo "SSH EXIT: $?" >> sftp-debug.txt

      - name: Commit debug output
        run: |
          cat sftp-debug.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sftp-debug.txt
          git commit -m "debug: SFTP directory discovery output" || true
          git push || true
