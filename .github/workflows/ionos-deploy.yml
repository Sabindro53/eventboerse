name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: SFTP Deploy to IONOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        env:
          SFTP_PASS: ${{ secrets.IONOS_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.IONOS_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.IONOS_FTP_SERVER }}
        run: |
          # Write output to summary (visible without auth)
          exec > >(tee -a "$GITHUB_STEP_SUMMARY") 2>&1
          echo '```'
          
          echo "=== SFTP Connection Test ==="
          echo "Host: $SFTP_HOST"
          echo "User: $SFTP_USER"
          
          # Use sshpass + sftp in batch mode
          sudo apt-get install -y -qq sshpass
          
          echo "=== Listing SFTP root ==="
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" <<'SFTP_BATCH' || echo "SFTP FAILED with exit code $?"
          pwd
          ls -la
          ls -la wp-content/themes/eventboerse/
          bye
          SFTP_BATCH
          
          echo '```'
