name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: PR-Validierung
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP Syntax Check
        run: |
          find . -name "*.php" \
            -not -path "./.git/*" \
            -not -path "./vendor/*" \
            | xargs -I{} php -l {} \
            && echo "✅ Alle PHP-Dateien syntaktisch korrekt"

      - name: Geänderte Dateien anzeigen
        run: |
          echo "### Geänderte Dateien in diesem PR:" >> $GITHUB_STEP_SUMMARY
          git diff --name-only origin/main...HEAD >> $GITHUB_STEP_SUMMARY

      - name: PR-Kommentar mit Vorschau-Link
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('🚀 Deploy-Vorschau'));
            const body = `🚀 **Deploy-Vorschau**\n\nNach dem Merge wird automatisch auf [eventbörse.de](https://xn--eventbrse-57a.de) deployed.\n\n✅ PHP-Syntax OK`;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
